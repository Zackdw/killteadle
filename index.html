<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killtaamdle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 24px 0 4px;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e94560;
  }

  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* Input area */
  .input-area {
    position: relative;
    width: 400px;
    max-width: 90vw;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-area input {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #16213e;
    color: #eee;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus {
    border-color: #e94560;
  }

  .input-area input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .guess-btn {
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 700;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .guess-btn:hover { background: #c73e54; }
  .guess-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 240px;
    overflow-y: auto;
    background: #16213e;
    border: 1px solid #333;
    border-radius: 0 0 8px 8px;
    z-index: 10;
    display: none;
  }

  .dropdown.visible { display: block; }

  .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid #1a1a2e;
  }

  .dropdown-item:hover,
  .dropdown-item.selected {
    background: #e94560;
    color: #fff;
  }

  .dropdown-item .team-hint {
    color: #999;
    font-size: 12px;
    margin-left: 8px;
  }

  .dropdown-item:hover .team-hint,
  .dropdown-item.selected .team-hint {
    color: #ddd;
  }

  /* Guess table */
  .guesses {
    width: 700px;
    max-width: 95vw;
  }

  .guess-row {
    display: grid;
    grid-template-columns: 1.5fr 0.6fr 1.2fr 0.8fr 1.8fr;
    gap: 6px;
    margin-bottom: 6px;
  }

  .guess-header {
    margin-bottom: 8px;
  }

  .guess-header .cell {
    background: #0f3460 !important;
    color: #ccc;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cell {
    padding: 10px 8px;
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cell.correct {
    background: #2d6a4f;
    color: #fff;
  }

  .cell.wrong {
    background: #922;
    color: #fff;
  }

  /* Status messages */
  .status {
    margin: 16px 0;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    min-height: 28px;
  }

  .status.win { color: #2d6a4f; }
  .status.lose { color: #e94560; }

  .guess-count {
    color: #888;
    font-size: 13px;
    margin-bottom: 12px;
  }

  /* Play again */
  .play-again {
    margin-top: 16px;
    padding: 12px 32px;
    font-size: 16px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    display: none;
  }

  .play-again:hover { background: #c73e54; }

  /* Responsive */
  @media (max-width: 600px) {
    .guess-row {
      grid-template-columns: 1fr 0.5fr 1fr 0.7fr 1.4fr;
      gap: 3px;
    }
    .cell { font-size: 11px; padding: 8px 4px; }
  }
</style>
</head>
<body>

<h1>Killtaamdle</h1>
<p class="subtitle">Guess the operative in 8 tries</p>

<p class="guess-count">Guesses: <span id="guessCount">0</span> / 8</p>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="guessInput" placeholder="Type an operative name..." autocomplete="off">
    <button class="guess-btn" id="guessBtn">Guess</button>
  </div>
  <div class="dropdown" id="dropdown"></div>
</div>

<div class="guesses">
  <div class="guess-row guess-header">
    <div class="cell">Team</div>
    <div class="cell">APL</div>
    <div class="cell">Faction</div>
    <div class="cell">Base</div>
    <div class="cell">Operative</div>
  </div>
  <div id="guessRows"></div>
</div>

<div class="status" id="status"></div>
<button class="play-again" id="playAgain">Play Again</button>

<script>
let operatives = [];
let target = null;
let guesses = [];
let maxGuesses = 8;
let gameOver = false;

async function loadData() {
  if (typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA.length > 0) {
    operatives = EMBEDDED_DATA;
  } else {
    try {
      const resp = await fetch('data.json');
      operatives = await resp.json();
    } catch (e) {
      console.error('Failed to load data:', e);
    }
  }
  pickTarget();
}

function pickTarget() {
  target = operatives[Math.floor(Math.random() * operatives.length)];
}

function resetGame() {
  guesses = [];
  gameOver = false;
  pickTarget();
  document.getElementById('guessRows').innerHTML = '';
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = 'status';
  document.getElementById('guessCount').textContent = '0';
  document.getElementById('playAgain').style.display = 'none';
  const input = document.getElementById('guessInput');
  input.disabled = false;
  document.getElementById('guessBtn').disabled = false;
  input.value = '';
  input.focus();
}

// Autocomplete
const input = document.getElementById('guessInput');
const dropdown = document.getElementById('dropdown');
let selectedIdx = -1;
let filteredOps = [];

input.addEventListener('input', () => {
  const val = input.value.trim().toUpperCase();
  if (val.length < 1) {
    dropdown.classList.remove('visible');
    filteredOps = [];
    return;
  }

  // Filter: exclude already guessed
  const guessedNames = new Set(guesses.map(g => g.name));
  filteredOps = operatives
    .filter(o => !guessedNames.has(o.name) && o.name.toUpperCase().includes(val))
    .slice(0, 15);

  if (filteredOps.length === 0) {
    dropdown.classList.remove('visible');
    return;
  }

  selectedIdx = -1;
  renderDropdown();
  dropdown.classList.add('visible');
});

input.addEventListener('keydown', (e) => {
  if (!dropdown.classList.contains('visible') || filteredOps.length === 0) {
    if (e.key === 'Enter') {
      // Try to submit exact match
      trySubmit(input.value.trim());
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, filteredOps.length - 1);
    renderDropdown();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, -1);
    renderDropdown();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0 && selectedIdx < filteredOps.length) {
      submitGuess(filteredOps[selectedIdx]);
    } else {
      trySubmit(input.value.trim());
    }
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('visible');
  }
});

function trySubmit(val) {
  const upper = val.toUpperCase();
  const match = operatives.find(o => o.name.toUpperCase() === upper);
  if (match) {
    submitGuess(match);
  }
}

function renderDropdown() {
  dropdown.innerHTML = filteredOps.map((o, i) =>
    `<div class="dropdown-item${i === selectedIdx ? ' selected' : ''}"
          data-idx="${i}">
      ${o.name}<span class="team-hint">${o.team}</span>
    </div>`
  ).join('');

  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const idx = parseInt(el.dataset.idx);
      submitGuess(filteredOps[idx]);
    });
  });

  // Scroll selected into view
  if (selectedIdx >= 0) {
    const sel = dropdown.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }
}

input.addEventListener('blur', () => {
  setTimeout(() => dropdown.classList.remove('visible'), 150);
});

input.addEventListener('focus', () => {
  if (input.value.trim().length > 0 && filteredOps.length > 0) {
    dropdown.classList.add('visible');
  }
});

function submitGuess(op) {
  if (gameOver) return;

  // Don't allow duplicate guesses
  if (guesses.find(g => g.name === op.name)) {
    input.value = '';
    dropdown.classList.remove('visible');
    return;
  }

  guesses.push(op);
  dropdown.classList.remove('visible');
  input.value = '';
  filteredOps = [];

  renderGuessRow(op);

  document.getElementById('guessCount').textContent = guesses.length;

  // Check win/lose
  if (op.name === target.name) {
    gameOver = true;
    document.getElementById('status').textContent = `You got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`;
    document.getElementById('status').className = 'status win';
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    document.getElementById('playAgain').style.display = 'inline-block';
  } else if (guesses.length >= maxGuesses) {
    gameOver = true;
    document.getElementById('status').textContent = `Game over! It was ${target.name} (${target.team})`;
    document.getElementById('status').className = 'status lose';
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    document.getElementById('playAgain').style.display = 'inline-block';
  } else {
    input.focus();
  }
}

function renderGuessRow(op) {
  const row = document.createElement('div');
  row.className = 'guess-row';

  const fields = [
    { val: op.team, correct: op.team === target.team },
    { val: op.apl, correct: op.apl === target.apl },
    { val: op.faction, correct: op.faction === target.faction },
    { val: op.base_size, correct: op.base_size === target.base_size },
    { val: op.name, correct: op.name === target.name },
  ];

  fields.forEach(f => {
    const cell = document.createElement('div');
    cell.className = `cell ${f.correct ? 'correct' : 'wrong'}`;
    cell.textContent = f.val;
    cell.title = f.val;
    row.appendChild(cell);
  });

  document.getElementById('guessRows').appendChild(row);
}

document.getElementById('playAgain').addEventListener('click', resetGame);

document.getElementById('guessBtn').addEventListener('click', () => {
  if (selectedIdx >= 0 && selectedIdx < filteredOps.length) {
    submitGuess(filteredOps[selectedIdx]);
  } else {
    trySubmit(input.value.trim());
  }
});

loadData();
</script>
</body>
</html>
