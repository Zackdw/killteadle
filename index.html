    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: var(--kt-light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Title area */
  .title-bar {
    width: 100%;
    background: linear-gradient(180deg, rgba(35,31,32,0.95) 0%, rgba(35,31,32,0.85) 100%);
    border-bottom: 3px solid var(--kt-orange);
    padding: 18px 0 14px;
    text-align: center;
    margin-bottom: 20px;
  }

  h1 {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px rgba(241,92,34,0.4);
  }

  h1 .accent {
    color: var(--kt-orange);
  }

  .subtitle {
    font-family: var(--font-condensed);
    color: #999;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(241,92,34,0.3);
  }

  .mode-btn {
    padding: 6px 18px;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(35,31,32,0.8);
    color: #777;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--kt-orange);
    color: #fff;
  }

  .mode-btn:hover:not(.active) {
    background: rgba(241,92,34,0.15);
    color: #bbb;
  }

  /* Guess counter */
  .guess-count {
    font-family: var(--font-condensed);
    color: #888;
    font-size: 14px;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .guess-count span {
    color: var(--kt-orange);
    font-weight: 700;
  }

  /* Input area */
  .input-area {
    position: relative;
    width: 440px;
    max-width: 92vw;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-area input {
    flex: 1;
    padding: 12px 16px;
    font-family: var(--font-condensed);
    font-size: 16px;
    letter-spacing: 0.5px;
    border: 2px solid #444;
    border-radius: 4px;
    background: rgba(35,31,32,0.9);
    color: var(--kt-light);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus {
    border-color: var(--kt-orange);
    box-shadow: 0 0 8px rgba(241,92,34,0.3);
  }

  .input-area input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .input-area input::placeholder {
    color: #666;
    font-style: italic;
  }

  .guess-btn {
    padding: 12px 22px;
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--kt-orange);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .guess-btn:hover {
    background: var(--kt-orange-dark);
    box-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  .guess-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 260px;
    overflow-y: auto;
    background: rgba(35,31,32,0.97);
    border: 1px solid #555;
    border-top: none;
    border-radius: 0 0 4px 4px;
    z-index: 10;
    display: none;
  }

  .dropdown.visible { display: block; }

  .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--font-condensed);
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }

  .dropdown-item:hover,
  .dropdown-item.selected {
    background: var(--kt-orange);
    color: #fff;
  }

  .dropdown-item .team-hint {
    color: #777;
    font-size: 12px;
    margin-left: 8px;
  }

  .dropdown-item:hover .team-hint,
  .dropdown-item.selected .team-hint {
    color: rgba(255,255,255,0.7);
  }

  .guesses {
    width: 740px;
    max-width: 95vw;
  }

  .guess-row {
    display: grid;
    grid-template-columns: 1.5fr 0.6fr 1.2fr 0.8fr 1.8fr;
    gap: 5px;
    margin-bottom: 5px;
  }

    color: var(--kt-orange);
    font-family: var(--font-heading);
    font-size: 12px;
    font-weight: 700;

    letter-spacing: 2px;
    border: 1px solid rgba(241,92,34,0.3);
    border-bottom: 2px solid var(--kt-orange);
    position: relative;
  }

  .guess-header .cell.has-popup {
    cursor: pointer;
    user-select: none;
  }

  .guess-header .cell.has-popup::after {
    content: '?';
    font-size: 9px;
    font-weight: 700;
    margin-left: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(241,92,34,0.3);
    color: var(--kt-orange);
    vertical-align: middle;
  }

  /* Popup overlay */
  .popup-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .popup-backdrop.visible {
    display: flex;
  }

  .popup-box {
    background: var(--kt-dark);
    border: 2px solid var(--kt-orange);
    border-radius: 6px;
    padding: 20px 24px;
    max-width: 360px;
    width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(241,92,34,0.2);
    animation: popupIn 0.15s ease-out;
  }

  @keyframes popupIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .popup-title {
    color: var(--kt-orange);
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(241,92,34,0.3);
    padding-bottom: 8px;
  }

  .popup-values {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .popup-val {
    background: rgba(241,92,34,0.12);
    border: 1px solid rgba(241,92,34,0.35);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    color: var(--kt-light);
    letter-spacing: 0.5px;
  }

  .popup-dismiss {
    display: block;
    width: 100%;
    padding: 8px;
    background: rgba(241,92,34,0.15);
    border: 1px solid rgba(241,92,34,0.3);
    border-radius: 4px;
    color: #999;
    font-family: var(--font-condensed);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .popup-dismiss:hover {
    background: var(--kt-orange);
    color: #fff;
  }

  /* Guess cells */
  .cell {
    padding: 10px 8px;
    border-radius: 3px;
    text-align: center;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    position: relative;
  }

  /* Animation: cells start hidden, pop in from left */
  .cell.anim-pending {
    opacity: 0;
    transform: translateX(-30px) scale(0.85);
  }

  .cell.anim-pop {
    animation: cellPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes cellPop {
    0% {
      opacity: 0;
      transform: translateX(-30px) scale(0.85);
    }
    60% {
      opacity: 1;
      transform: translateX(4px) scale(1.06);
    }
    100% {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
  }

  /* Shake for wrong cells */
  .cell.anim-shake {
    animation: cellPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               cellShake 0.6s 0.4s ease-out;
  }

  @keyframes cellShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  /* Glow pulse for correct cells */
  .cell.anim-glow {
    animation: cellPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               cellGlow 0.6s 0.4s ease-out;
  }

  @keyframes cellGlow {
    0% { box-shadow: 0 0 0 0 rgba(45,106,79,0.6); }
    50% { box-shadow: 0 0 14px 4px rgba(45,106,79,0.5); }
    100% { box-shadow: 0 0 4px 1px rgba(45,106,79,0.2); }
  }

  /* Particle burst container */
  .cell-particles {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
    z-index: 5;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--kt-orange);
    animation: particleBurst 0.8s ease-out forwards;
  }

  .particle.green {
    background: #4ade80;
  }

  @keyframes particleBurst {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--px), var(--py)) scale(0);
    }
  }

  /* Status animation */
  .status.anim-in {
    animation: statusPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes statusPop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* End buttons animation */
  .end-buttons.anim-in {
    animation: fadeUp 0.5s ease-out forwards;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .cell.correct {
    background: linear-gradient(135deg, #2d6a4f 0%, #1b5e3b 100%);
    border: 1px solid rgba(45,106,79,0.6);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .cell.wrong {
    background: linear-gradient(135deg, #7a1a1a 0%, #5a1111 100%);
    border: 1px solid rgba(122,26,26,0.6);
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* Status */
  .status {
    margin: 18px 0;
    font-family: var(--font-heading);
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    min-height: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status.win {
    color: var(--kt-green);
    text-shadow: 0 0 12px rgba(45,106,79,0.5);
  }

  .status.lose {
    color: var(--kt-orange);
    text-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  /* Play Again */
  .play-again {
    padding: 12px 36px;
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--kt-orange);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .play-again:hover {
    background: var(--kt-orange-dark);
    box-shadow: 0 0 16px rgba(241,92,34,0.4);
  }

  .end-buttons {
    display: none;
    gap: 10px;
    margin-top: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .end-buttons.visible {
    display: flex;
  }

  .share-btn {
    padding: 12px 28px;
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: transparent;
    color: var(--kt-orange);
    border: 2px solid var(--kt-orange);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .share-btn:hover {
    background: var(--kt-orange);
    color: #fff;
    box-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  .share-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--kt-dark);
    border: 1px solid var(--kt-orange);
    color: var(--kt-light);
    font-family: var(--font-condensed);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .share-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Decorative orange bar at very bottom */
  .footer-bar {
    margin-top: auto;
    width: 100%;
    height: 4px;
    background: var(--kt-orange);
  }

  /* Responsive */
  @media (max-width: 600px) {
    h1 { font-size: 26px; letter-spacing: 2px; }
    .guess-row {
      grid-template-columns: 1fr 0.5fr 1fr 0.7fr 1.4fr;
      gap: 3px;
    }
    .cell { font-size: 11px; padding: 8px 4px; }
    .popup-box { padding: 16px 18px; }
    .popup-val { font-size: 11px; padding: 4px 8px; }
  }
</style>
</head>

<script>
let operatives = [];
let target = null;
let guesses = [];
let maxGuesses = 8;
let gameOver = false;
let isDaily = true;

// Deterministic hash for daily operative
function hashDate(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) {
    h = ((h << 5) - h + dateStr.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function getDailyTarget() {
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const idx = hashDate(dateStr) % operatives.length;
  return operatives[idx];
}

function getRandomTarget() {
  return operatives[Math.floor(Math.random() * operatives.length)];
}

function pickTarget() {
  target = isDaily ? getDailyTarget() : getRandomTarget();
}

async function loadData() {
  if (typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA.length > 0) {
    operatives = EMBEDDED_DATA;
  } else {
    try {
      const resp = await fetch('data.json');
      operatives = await resp.json();
    } catch (e) {
      console.error('Failed to load data:', e);
    }
  }
  pickTarget();
}

function resetGame() {
  guesses = [];
  gameOver = false;
  if (!isDaily) {
    target = getRandomTarget();
  } else {
    target = getDailyTarget();
  }
  document.getElementById('guessRows').innerHTML = '';
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = 'status';
  document.getElementById('guessCount').textContent = '0';
  document.getElementById('endButtons').classList.remove('visible');
  document.getElementById('endButtons').classList.remove('anim-in');
  const input = document.getElementById('guessInput');
  input.disabled = false;
  document.getElementById('guessBtn').disabled = false;
  input.value = '';
  input.focus();
}

// Mode toggle
document.getElementById('dailyBtn').addEventListener('click', () => {
  if (isDaily) return;
  isDaily = true;
  document.getElementById('dailyBtn').classList.add('active');
  document.getElementById('randomBtn').classList.remove('active');
  resetGame();
});

document.getElementById('randomBtn').addEventListener('click', () => {
  if (!isDaily) return;
  isDaily = false;
  document.getElementById('randomBtn').classList.add('active');
  document.getElementById('dailyBtn').classList.remove('active');
  resetGame();
});

// Autocomplete
const input = document.getElementById('guessInput');
const dropdown = document.getElementById('dropdown');
let selectedIdx = -1;
let filteredOps = [];

input.addEventListener('input', () => {
  const val = input.value.trim().toUpperCase();
  if (val.length < 1) {
    dropdown.classList.remove('visible');
    filteredOps = [];
    return;
  }

  const guessedNames = new Set(guesses.map(g => g.name));
  filteredOps = operatives
    .filter(o => !guessedNames.has(o.name) && o.name.toUpperCase().includes(val))
    .slice(0, 15);

  if (filteredOps.length === 0) {
    dropdown.classList.remove('visible');
    return;
  }

  selectedIdx = -1;
  renderDropdown();
  dropdown.classList.add('visible');
});

input.addEventListener('keydown', (e) => {
  if (!dropdown.classList.contains('visible') || filteredOps.length === 0) {
    if (e.key === 'Enter') {
      trySubmit(input.value.trim());
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, filteredOps.length - 1);
    renderDropdown();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, -1);
    renderDropdown();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0 && selectedIdx < filteredOps.length) {
      submitGuess(filteredOps[selectedIdx]);
    } else {
      trySubmit(input.value.trim());
    }
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('visible');
  }
});

function trySubmit(val) {
  const upper = val.toUpperCase();
  const match = operatives.find(o => o.name.toUpperCase() === upper);
  if (match) {
    submitGuess(match);
  }
}

function renderDropdown() {
  dropdown.innerHTML = filteredOps.map((o, i) =>
    `<div class="dropdown-item${i === selectedIdx ? ' selected' : ''}"
          data-idx="${i}">
      ${o.name}<span class="team-hint">${o.team}</span>
    </div>`
  ).join('');

  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const idx = parseInt(el.dataset.idx);
      submitGuess(filteredOps[idx]);
    });
  });

  if (selectedIdx >= 0) {
    const sel = dropdown.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }
}

input.addEventListener('blur', () => {
  setTimeout(() => dropdown.classList.remove('visible'), 150);
});

input.addEventListener('focus', () => {
  if (input.value.trim().length > 0 && filteredOps.length > 0) {
    dropdown.classList.add('visible');
  }
});

function submitGuess(op) {
  if (gameOver) return;

  if (guesses.find(g => g.name === op.name)) {
    input.value = '';
    dropdown.classList.remove('visible');
    return;
  }

  guesses.push(op);
  dropdown.classList.remove('visible');
  input.value = '';
  filteredOps = [];

  renderGuessRow(op);

  document.getElementById('guessCount').textContent = guesses.length;

  // Calculate delay for status/buttons to appear after cell animations
  const animDelay = 5 * 120 + 600;

  if (op.name === target.name) {
    gameOver = true;
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    setTimeout(() => {
      const s = document.getElementById('status');
      s.textContent = `You got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`;
      s.className = 'status win anim-in';
      const eb = document.getElementById('endButtons');
      eb.classList.add('visible');
      eb.classList.add('anim-in');
    }, animDelay);
  } else if (guesses.length >= maxGuesses) {
    gameOver = true;
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    setTimeout(() => {
      const s = document.getElementById('status');
      s.textContent = `Game over! It was ${target.name} (${target.team})`;
      s.className = 'status lose anim-in';
      const eb = document.getElementById('endButtons');
      eb.classList.add('visible');
      eb.classList.add('anim-in');
    }, animDelay);
  } else {
    input.focus();
  }
}

function spawnParticles(cell, isCorrect) {
  const container = document.createElement('div');
  container.className = 'cell-particles';
  const count = isCorrect ? 8 : 4;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 14 + Math.random() * 18;
    p.className = `particle${isCorrect ? ' green' : ''}`;
    p.style.setProperty('--px', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--py', `${Math.sin(angle) * dist}px`);
    p.style.animationDelay = `${Math.random() * 0.08}s`;
    container.appendChild(p);
  }
  cell.appendChild(container);
  setTimeout(() => container.remove(), 1000);
}

function renderGuessRow(op) {
  const row = document.createElement('div');
  row.className = 'guess-row';

  const fields = [
    { val: op.team, correct: op.team === target.team },
    { val: op.apl, correct: op.apl === target.apl },
    { val: op.faction, correct: op.faction === target.faction },
    { val: op.base_size, correct: op.base_size === target.base_size },
    { val: op.name, correct: op.name === target.name },
  ];

  const cells = [];
  fields.forEach(f => {
    const cell = document.createElement('div');
    cell.className = `cell ${f.correct ? 'correct' : 'wrong'} anim-pending`;
    cell.textContent = f.val;
    cell.title = f.val;
    cell._isCorrect = f.correct;
    row.appendChild(cell);
    cells.push(cell);
  });

  document.getElementById('guessRows').appendChild(row);

  // Stagger reveal left to right
  cells.forEach((cell, i) => {
    setTimeout(() => {
      cell.classList.remove('anim-pending');
      cell.classList.add(cell._isCorrect ? 'anim-glow' : 'anim-shake');
      spawnParticles(cell, cell._isCorrect);
    }, i * 120);
  });

  // Return total animation time for sequencing status/buttons
  return cells.length * 120 + 500;
}

  apl: { title: 'APL — Possible Values', values: ['1', '2', '3', '4'] },
  faction: { title: 'Faction — Possible Values', values: ['IMPERIUM', 'CHAOS', 'TYRANID', 'T\u2019AU EMPIRE', 'AELDARI', 'LEAGUES OF VOTANN', 'ORK', 'NECRON'] },

const popupBackdrop = document.getElementById('popupBackdrop');
const popupTitle = document.getElementById('popupTitle');
const popupValues = document.getElementById('popupValues');

document.querySelectorAll('.has-popup').forEach(cell => {
  cell.addEventListener('click', (e) => {
    e.stopPropagation();
    const key = cell.dataset.popup;
    const data = popupData[key];
    if (!data) return;
    popupTitle.textContent = data.title;
    popupValues.innerHTML = data.values.map(v => `<span class="popup-val">${v}</span>`).join('');

});

function dismissPopup() {
  popupBackdrop.classList.remove('visible');
}

popupBackdrop.addEventListener('click', dismissPopup);

  dismissPopup();
});

// Share functionality
function buildShareCanvas() {
  const won = guesses.length > 0 && guesses[guesses.length - 1].name === target.name;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
    const cols = ['Team', 'APL', 'Faction', 'Base', 'Operative'];
    const colWidths = [140, 50, 110, 70, 170];
    const rowH = 34;
    const headerH = 30;
    const pad = 16;
    const totalW = colWidths.reduce((a,b) => a+b, 0) + (cols.length - 1) * 4 + pad * 2;
    const titleH = 50;
    const statusH = 36;
    const urlBarH = 32;
    const totalH = titleH + headerH + 4 + guesses.length * (rowH + 4) + statusH + urlBarH + pad * 2;

    canvas.width = totalW;
    canvas.height = totalH;

    // Background
    ctx.fillStyle = '#1a1715';
    ctx.fillRect(0, 0, totalW, totalH);

    // Orange top bar
    ctx.fillStyle = '#f15c22';
    ctx.fillRect(0, 0, totalW, 3);

    // Title
    ctx.font = 'bold 22px Oswald, Impact, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText('KillTeadle', totalW / 2, titleH - 12);

    // Header row
    let y = titleH;
    let x = pad;
    ctx.font = 'bold 10px Oswald, Impact, sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < cols.length; i++) {
      ctx.fillStyle = 'rgba(35,31,32,0.85)';
      ctx.fillRect(x, y, colWidths[i], headerH);
      ctx.fillStyle = '#f15c22';
      ctx.fillRect(x, y + headerH - 2, colWidths[i], 2);
      ctx.fillStyle = '#f15c22';
      ctx.fillText(cols[i].toUpperCase(), x + colWidths[i] / 2, y + headerH / 2 + 4);
      x += colWidths[i] + 4;
    }
    y += headerH + 4;

    // Guess rows
    ctx.font = '600 11px Barlow Condensed, Arial Narrow, sans-serif';
    for (const g of guesses) {
      const vals = [g.team, String(g.apl), g.faction, g.base_size, g.name];
      const matches = [
        g.team === target.team,
        g.apl === target.apl,
        g.faction === target.faction,
        g.base_size === target.base_size,
        g.name === target.name
      ];
      x = pad;
      for (let i = 0; i < vals.length; i++) {
        ctx.fillStyle = matches[i] ? '#2d6a4f' : '#7a1a1a';
        ctx.fillRect(x, y, colWidths[i], rowH);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        // In daily mode, hide text to avoid spoilers
        if (!isDaily) {
          let text = vals[i];
          while (ctx.measureText(text).width > colWidths[i] - 8 && text.length > 3) {
            text = text.slice(0, -1);
          }
          ctx.fillText(text, x + colWidths[i] / 2, y + rowH / 2 + 4);
        }
        x += colWidths[i] + 4;
      }
      y += rowH + 4;
    }

    // Status text
    ctx.font = 'bold 14px Oswald, Impact, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = won ? '#2d6a4f' : '#f15c22';
    const statusText = won
      ? `Got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`
      : `Answer: ${target.name}`;
    ctx.fillText(statusText, totalW / 2, y + 20);

    // URL line - prominent
    ctx.font = 'bold 13px Barlow Condensed, Arial Narrow, sans-serif';
    ctx.fillStyle = '#f15c22';
    ctx.textAlign = 'center';
    ctx.fillText('\u25B6  zackdw.github.io/killteadle  \u25C0', totalW / 2, y + 44);

    // Orange bottom bar
    ctx.fillStyle = '#f15c22';
    ctx.fillRect(0, totalH - 3, totalW, 3);

    return canvas;
}

// Share: copy image to clipboard (image has URL baked in)
document.getElementById('shareBtn').addEventListener('click', async () => {
  try {
    const canvas = buildShareCanvas();
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));

    // Try writing both image + text to clipboard
    try {
      const textBlob = new Blob(['https://zackdw.github.io/killteadle/'], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({
          'image/png': blob,
          'text/plain': textBlob
        })
      ]);
    } catch {
      // Fallback: image only
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
    }
    showToast('Image copied! Paste in Discord');
  } catch (err) {
    // Final fallback: download the file
    try {
      const canvas = buildShareCanvas();
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'killteadle.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Image saved!');
    } catch (e2) {
      console.error('Share failed:', e2);
    }
  }
});

// Copy Link: quick copy the URL
document.getElementById('copyLinkBtn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText('https://zackdw.github.io/killteadle/');
    showToast('Link copied!');
  } catch (err) {
    console.error('Copy link failed:', err);
  }
});

function showToast(msg) {
  const toast = document.getElementById('shareToast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3000);
}
