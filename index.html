    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: var(--kt-light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Title area */
  .title-bar {
    width: 100%;
    background: linear-gradient(180deg, rgba(35,31,32,0.95) 0%, rgba(35,31,32,0.85) 100%);
    border-bottom: 3px solid var(--kt-orange);
    padding: 18px 0 14px;
    text-align: center;
    margin-bottom: 20px;
  }

  h1 {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px rgba(241,92,34,0.4);
  }

  h1 .accent {
    color: var(--kt-orange);
  }

  .subtitle {
    font-family: var(--font-condensed);
    color: #999;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Mode toggle */
  .mode-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(241,92,34,0.3);
  }

  .mode-btn {
    padding: 6px 18px;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(35,31,32,0.8);
    color: #777;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--kt-orange);
    color: #fff;
  }

  .mode-btn:hover:not(.active) {
    background: rgba(241,92,34,0.15);
    color: #bbb;
  }

  .filter-teams-btn {
    padding: 7px 12px;
    font-family: var(--font-condensed);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border: 1px solid rgba(241,92,34,0.4);
    border-radius: 4px;
    background: rgba(35,31,32,0.8);
    color: var(--kt-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-teams-btn:hover {
    background: rgba(241,92,34,0.14);
    border-color: rgba(241,92,34,0.7);
  }

  .filter-teams-btn.hidden {
    display: none;
  }

  /* Guess counter */
  .guess-count {
    font-family: var(--font-condensed);
    color: #888;
    font-size: 14px;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .guess-count span {
    color: var(--kt-orange);
    font-weight: 700;
  }

  /* Input area */
  .input-area {
    position: relative;
    width: 440px;
    max-width: 92vw;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-area input {
    flex: 1;
    padding: 12px 16px;
    font-family: var(--font-condensed);
    font-size: 16px;
    letter-spacing: 0.5px;
    border: 2px solid #444;
    border-radius: 4px;
    background: rgba(35,31,32,0.9);
    color: var(--kt-light);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus {
    border-color: var(--kt-orange);
    box-shadow: 0 0 8px rgba(241,92,34,0.3);
  }

  .input-area input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .input-area input::placeholder {
    color: #666;
    font-style: italic;
  }

  .guess-btn {
    padding: 12px 22px;
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--kt-orange);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .guess-btn:hover {
    background: var(--kt-orange-dark);
    box-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  .guess-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  .guess-btn.anim-press {
    animation: btnKick 0.55s ease-out;
  }

  .guess-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: translateX(-120%);
    opacity: 0;
    pointer-events: none;
  }

  .guess-btn.anim-press::after {
    opacity: 1;
    animation: btnSweep 0.65s ease-out;
  }

  @keyframes btnKick {
    0% { transform: translateY(0) scale(1); box-shadow: 0 0 0 0 rgba(241,92,34,0.35); }
    40% { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 20px 0 rgba(241,92,34,0.28); }
    100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 0 rgba(241,92,34,0); }
  }

  @keyframes btnSweep {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 260px;
    overflow-y: auto;
    background: rgba(35,31,32,0.97);
    border: 1px solid #555;
    border-top: none;
    border-radius: 0 0 4px 4px;
    z-index: 10;
    display: none;
  }

  .dropdown.visible { display: block; }

  .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--font-condensed);
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }

  .dropdown-item:hover,
  .dropdown-item.selected {
    background: var(--kt-orange);
    color: #fff;
  }

  .dropdown-item .team-hint {
    color: #777;
    font-size: 12px;
    margin-left: 8px;
  }

  .dropdown-item:hover .team-hint,
  .dropdown-item.selected .team-hint {
    color: rgba(255,255,255,0.7);
  }

  /* Guess table */
  .guesses {
    width: 860px;
    max-width: 95vw;
  }

  .guess-row {
    display: grid;
    grid-template-columns: 1.5fr 0.6fr 1.2fr 0.8fr 1.6fr 1.8fr;
    gap: 5px;
    margin-bottom: 5px;
  }

  .guess-header {
    margin-bottom: 10px;
  }

    color: var(--kt-orange);
    font-family: var(--font-heading);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 1px solid rgba(241,92,34,0.3);
    border-bottom: 2px solid var(--kt-orange);
    position: relative;
  }

  .guess-header .cell.has-popup {
    cursor: pointer;
    user-select: none;
  }

  .guess-header .cell.has-popup::after {
    content: '?';
    font-size: 9px;
    font-weight: 700;
    margin-left: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(241,92,34,0.3);
    color: var(--kt-orange);
    vertical-align: middle;
  }

  /* Popup overlay */
  .popup-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .popup-backdrop.visible {
    display: flex;
  }

  .popup-box {
    background: var(--kt-dark);
    border: 2px solid var(--kt-orange);
    border-radius: 6px;
    padding: 20px 24px;
    max-width: 360px;
    width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(241,92,34,0.2);
    animation: popupIn 0.15s ease-out;
  }

  @keyframes popupIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .popup-title {
    color: var(--kt-orange);
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(241,92,34,0.3);
    padding-bottom: 8px;
  }

  .popup-values {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .popup-val {
    background: rgba(241,92,34,0.12);
    border: 1px solid rgba(241,92,34,0.35);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    color: var(--kt-light);
    letter-spacing: 0.5px;
  }

  .popup-dismiss {
    display: block;
    width: 100%;
    padding: 8px;
    background: rgba(241,92,34,0.15);
    border: 1px solid rgba(241,92,34,0.3);
    border-radius: 4px;
    color: #999;
    font-family: var(--font-condensed);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .popup-dismiss:hover {
    background: var(--kt-orange);
    color: #fff;
  }

  .team-filter-box {
    max-width: 520px;
    max-height: min(78vh, 760px);
    display: flex;
    flex-direction: column;
  }

  .team-filter-summary {
    font-family: var(--font-condensed);
    font-size: 14px;
    color: #bdb6b2;
    letter-spacing: 0.4px;
    margin-bottom: 14px;
  }

  .team-filter-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    flex: 0 0 auto;
  }

  .team-filter-scroll {
    overflow-y: auto;
    min-height: 0;
    margin-bottom: 16px;
    padding-right: 6px;
    flex: 1 1 auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(241,92,34,0.85) rgba(255,255,255,0.06);
  }

  .team-filter-scroll::-webkit-scrollbar {
    width: 8px;
  }

  .team-filter-scroll::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
  }

  .team-filter-scroll::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(241,92,34,0.92), rgba(196,74,26,0.9));
    border-radius: 999px;
    border: 1px solid rgba(26,23,21,0.35);
  }

  .team-filter-scroll::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(241,92,34,1), rgba(196,74,26,0.98));
  }

  .team-filter-categories {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .team-filter-category {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }

  .team-filter-category input {
    accent-color: var(--kt-orange);
    width: 16px;
    height: 16px;
    margin: 0;
  }

  .team-filter-category-label {
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 700;
    color: var(--kt-light);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .team-filter-category-note {
    font-family: var(--font-condensed);
    font-size: 11px;
    color: #9d948f;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .team-filter-action {
    padding: 7px 10px;
    background: rgba(241,92,34,0.1);
    border: 1px solid rgba(241,92,34,0.28);
    border-radius: 4px;
    color: var(--kt-light);
    font-family: var(--font-condensed);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
  }

  .team-filter-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .team-filter-group {
    border: 1px solid rgba(241,92,34,0.22);
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .team-filter-group-title {
    position: sticky;
    top: 0;
    z-index: 1;
    background: rgba(35,31,32,0.96);
    font-family: var(--font-heading);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--kt-orange);
    padding: 10px 12px 8px;
    border-bottom: 1px solid rgba(241,92,34,0.2);
  }

  .team-filter-group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    padding: 10px;
  }

  .team-filter-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
  }

  .team-filter-option input {
    accent-color: var(--kt-orange);
    width: 16px;
    height: 16px;
    margin: 0;
    flex: 0 0 auto;
  }

  .team-filter-label {
    font-family: var(--font-condensed);
    font-size: 14px;
    font-weight: 600;
    color: var(--kt-light);
    letter-spacing: 0.4px;
    line-height: 1.1;
  }

  .team-filter-footer {
    display: flex;
    gap: 10px;
  }

  .team-filter-footer .popup-dismiss {
    margin: 0;
  }

  .team-filter-footer .popup-dismiss.primary {
    background: var(--kt-orange);
    color: #fff;
    border-color: var(--kt-orange);
  }

  .team-filter-footer .popup-dismiss.primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  /* Guess cells */
  .cell {
    padding: 10px 8px;
    border-radius: 3px;
    text-align: center;
    font-family: var(--font-condensed);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cell.wr-cell {
    white-space: normal;
    overflow: visible;
    text-overflow: unset;
    font-size: 11px;
    line-height: 1.3;
    padding: 7px 6px;
    word-break: normal;
    overflow-wrap: anywhere;
  }

  .wr-chip-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .wr-chip {
    padding: 4px 7px;
    border-radius: 3px;
    font-size: 10px;
    line-height: 1.1;
    background: rgba(92, 68, 14, 0.95);
    border: 1px solid rgba(0, 0, 0, 0.2);
    color: #fff;
    white-space: nowrap;
  }

  .wr-chip.match {
    background: var(--kt-green);
    color: #eefbf3;
  }

  /* Animation: cells start hidden, pop in from left */
  .cell.anim-pending {
    opacity: 0;
    transform: translateX(-30px) scale(0.85);
  }

  .cell.anim-pop {
    animation: cellPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes cellPop {
    0% {
      opacity: 0;
      transform: translateX(-30px) scale(0.85);
    }
    60% {
      opacity: 1;
      transform: translateX(4px) scale(1.06);
    }
    100% {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
  }

  /* Wrong cells: playful wobble + scrape */
  .cell.anim-shake {
    animation: cellPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
               wobbleCard 0.75s 0.08s ease-out forwards;
  }

  .cell.anim-shake::before {
    content: '';
    position: absolute;
    inset: auto 0 0 0;
    height: 6px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    opacity: 0;
    animation: scrape 0.72s 0.1s ease-out forwards;
  }

  @keyframes wobbleCard {
    0% { transform: rotate(0deg) translateY(0); }
    18% { transform: rotate(-1.2deg) translateY(2px); }
    36% { transform: rotate(1deg) translateY(-1px); }
    54% { transform: rotate(-0.7deg) translateY(1px); }
    100% { transform: rotate(0deg) translateY(0); }
  }

  @keyframes scrape {
    0% { transform: translateX(-100%); opacity: 0; }
    35% { opacity: 0.6; }
    100% { transform: translateX(120%); opacity: 0; }
  }

  /* Correct cells: crest reveal + brief pulse */
  .cell.anim-glow {
    animation: crestReveal 0.55s cubic-bezier(0.2, 0.9, 0.2, 1) forwards,
               crestPulse 0.7s 0.08s ease-out forwards;
  }

  .cell.anim-glow::after {
    content: '';
    position: absolute;
    inset: auto -10% -45% -10%;
    height: 85%;
    background: radial-gradient(circle, rgba(107,240,167,0.34) 0%, transparent 65%);
    opacity: 0;
    animation: crestWave 0.8s 0.04s ease-out forwards;
  }

  @keyframes crestReveal {
    0% { opacity: 0; transform: scale(0.88) rotate(-2deg); }
    70% { opacity: 1; transform: scale(1.03) rotate(0.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  @keyframes crestPulse {
    0% { box-shadow: 0 0 0 0 rgba(107,240,167,0); }
    45% { box-shadow: 0 0 22px 5px rgba(107,240,167,0.24); }
    100% { box-shadow: 0 0 0 0 rgba(107,240,167,0); }
  }

  @keyframes crestWave {
    0% { opacity: 0.18; transform: translateY(4px) scale(0.92); }
    50% { opacity: 0.42; transform: translateY(0) scale(1.04); }
    100% { opacity: 0; transform: translateY(-2px) scale(1.02); }
  }

  /* Particle burst container */
  .cell-particles {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
    z-index: 5;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--kt-orange);
    animation: particleBurst 0.8s ease-out forwards;
  }

  .particle.green {
    background: #4ade80;
  }

  @keyframes particleBurst {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--px), var(--py)) scale(0);
    }
  }

  /* Status animation */
  .status.anim-in {
    animation: statusPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes statusPop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* End buttons animation */
  .end-buttons.anim-in {
    animation: fadeUp 0.5s ease-out forwards;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .cell.correct {
    background: linear-gradient(135deg, #2d6a4f 0%, #1b5e3b 100%);
    border: 1px solid rgba(45,106,79,0.6);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .cell.wrong {
    background: linear-gradient(135deg, #7a1a1a 0%, #5a1111 100%);
    border: 1px solid rgba(122,26,26,0.6);
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .cell.partial {
    background: linear-gradient(135deg, #b8860b 0%, #8b6508 100%);
    border: 1px solid rgba(184,134,11,0.6);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* Status */
  .status {
    margin: 18px 0;
    font-family: var(--font-heading);
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    min-height: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status.win {
    color: var(--kt-green);
    text-shadow: 0 0 12px rgba(45,106,79,0.5);
  }

  .status.lose {
    color: var(--kt-orange);
    text-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  /* Play Again */
  .play-again {
    padding: 12px 36px;
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--kt-orange);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .play-again:hover {
    background: var(--kt-orange-dark);
    box-shadow: 0 0 16px rgba(241,92,34,0.4);
  }

  .end-buttons {
    display: none;
    gap: 10px;
    margin-top: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .end-buttons.visible {
    display: flex;
  }

  .share-btn {
    padding: 12px 28px;
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: transparent;
    color: var(--kt-orange);
    border: 2px solid var(--kt-orange);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .share-btn:hover {
    background: var(--kt-orange);
    color: #fff;
    box-shadow: 0 0 12px rgba(241,92,34,0.4);
  }

  .share-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--kt-dark);
    border: 1px solid var(--kt-orange);
    color: var(--kt-light);
    font-family: var(--font-condensed);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .share-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Decorative orange bar at very bottom */
  .footer-bar {
    margin-top: auto;
    width: 100%;
    height: 4px;
    background: var(--kt-orange);
  }

  /* Responsive */
  @media (max-width: 600px) {
    h1 { font-size: 26px; letter-spacing: 2px; }
    .guess-row {
      grid-template-columns: 1fr 0.5fr 1fr 0.7fr 1.3fr 1.4fr;
      gap: 3px;
    }
    .guess-header {
      margin-bottom: 8px;
    }
    .guess-header .cell {
      min-height: 40px;
      padding: 6px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--kt-orange);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent), rgba(35,31,32,0.96);
      background-image: none;
      border: 1px solid rgba(241,92,34,0.22);
      border-bottom: 2px solid var(--kt-orange);
      border-radius: 4px;
    }
    .guess-header .cell.has-popup::after {
      width: 12px;
      height: 12px;
      font-size: 8px;
      margin-left: 3px;
      background: rgba(241,92,34,0.22);
    }
    .cell {
      font-size: 11px;
      padding: 8px 4px;
      min-height: 84px;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      overflow-wrap: anywhere;
      word-break: normal;
    }
    .cell.wr-cell {
      font-size: 10px;
      padding: 6px 4px;
    }
    .wr-chip {
      font-size: 9px;
      padding: 4px 6px;
    }
    .popup-box { padding: 16px 18px; }
    .popup-val { font-size: 11px; padding: 4px 8px; }
  }

  .site-logo {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 48px;
    height: 48px;
    opacity: 0.7;
    transition: opacity 0.2s;
    z-index: 100;
    pointer-events: auto;
  }
  .site-logo:hover {
    opacity: 1;
  }
  .site-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }
</style>
</head>

      <button class="popup-dismiss primary" id="teamFilterApplyBtn" type="button">Apply Filter</button>

  </div>
</div>

<script>
let operatives = [];
let target = null;
let guesses = [];
let maxGuesses = 8;
let gameOver = false;
let isDaily = true;
let dailySchedule = [];
let allTeams = [];
let randomSelectedTeams = new Set();
let pendingRandomSelectedTeams = new Set();
let randomAllowedTeams = new Set();
const gameStates = {
  daily: { target: null, guesses: [], gameOver: false },
  random: { target: null, guesses: [], gameOver: false }
};

const CLASSIFIED_TEAMS = new Set([
  'IMPERIAL NAVY BREACHERS',
  'KASRKIN',
  'FARSTALKER KINBAND',
  'HIEROTEK CIRCLE',
  'FELLGOR RAVAGERS',
  'EXACTION SQUAD',
  'HEARTHKYN SALVAGERS',
  'HAND OF THE ARCHON',
  'CHAOS CULT',
  'BLADES OF KHAINE',
  'INQUISITORIAL AGENTS',
  'SCOUT SQUAD',
  'BROOD BROTHERS',
  'NEMESIS CLAW',
  'HERNKYN YAEGIRS',
  'MANDRAKES',
  'TEMPESTUS AQUILONS',
  'ANGELS OF DEATH',
  'VESPID STINGWINGS',
  'RATLINGS',
  'PLAGUE MARINES',
  'WRECKA KREW',
  'GOREMONGERS',
  'BATTLECLADE',
  'SANCTIFIERS',
  'RAVENERS',
  'DEATHWATCH',
  'CANOPTEK CIRCLE',
  'WOLF SCOUTS',
  'XV26 STEALTH BATTLESUITS',
  'CELESTIAN INSIDIANTS',
  'MURDERWING'
]);

const DAILY_SCHEDULE_SEED = 20260424;
const DAILY_SCHEDULE_START = new Date(2026, 3, 24);

// Deterministic hash for daily operative
function hashDate(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) {
    h = ((h << 5) - h + dateStr.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function formatDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function legacyDailyTargetForDate(date) {
  const dateStr = formatDateKey(date);
  const idx = hashDate(dateStr) % operatives.length;
  return operatives[idx];
}

function dayNumber(date) {
  return Math.floor(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000);
}

function seededRandom(seed) {
  let state = seed >>> 0;
  return () => {
    state += 0x6D2B79F5;
    let t = state;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function shuffleWithRng(items, rng) {
  const shuffled = [...items];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function buildDailySchedule() {
  const rng = seededRandom(DAILY_SCHEDULE_SEED);
  const teamBuckets = new Map();

  operatives.forEach(op => {
    if (!teamBuckets.has(op.team)) {
      teamBuckets.set(op.team, []);
    }
    teamBuckets.get(op.team).push(op);
  });

  for (const [team, ops] of teamBuckets.entries()) {
    teamBuckets.set(team, shuffleWithRng(ops, rng));
  }

  const schedule = [];
  let lastTeam = null;

  while (schedule.length < operatives.length) {
    const availableTeams = [...teamBuckets.keys()].filter(team => teamBuckets.get(team).length > 0);
    const eligibleTeams = availableTeams.filter(team => team !== lastTeam);
    const candidates = eligibleTeams.length > 0 ? eligibleTeams : availableTeams;
    const selectedTeam = candidates[Math.floor(rng() * candidates.length)];
    schedule.push(teamBuckets.get(selectedTeam).shift());
    lastTeam = selectedTeam;
  }

  return schedule;
}

function getDailyTargetForDate(date) {
  if (date < DAILY_SCHEDULE_START || dailySchedule.length === 0) {
    return legacyDailyTargetForDate(date);
  }

  const offset = dayNumber(date) - dayNumber(DAILY_SCHEDULE_START);
  return dailySchedule[offset % dailySchedule.length];
}

function getDailyTarget() {
  return getDailyTargetForDate(new Date());
}

function isClassifiedTeam(team) {
  return CLASSIFIED_TEAMS.has(String(team).toUpperCase());
}

function getTeamsForCategory(category) {
  return allTeams.filter(team => category === 'classified' ? isClassifiedTeam(team) : !isClassifiedTeam(team));
}

function areAllCategoryTeamsSelected(category, selectedTeams = pendingRandomSelectedTeams) {
  const categoryTeams = getTeamsForCategory(category);
  return categoryTeams.length > 0 && categoryTeams.every(team => selectedTeams.has(team));
}

function syncRandomAllowedTeams() {
  randomAllowedTeams = new Set(randomSelectedTeams);
}

function getRandomOperativePool() {
  return operatives.filter(op => randomAllowedTeams.has(op.team));
}

function getCurrentOperativePool() {
  return isDaily ? operatives : getRandomOperativePool();
}

function getRandomTarget() {
  const pool = getRandomOperativePool();
  return pool[Math.floor(Math.random() * pool.length)];
}

function getStateForMode(modeDaily = isDaily) {
  return modeDaily ? gameStates.daily : gameStates.random;
}

function syncActiveState() {
  const state = getStateForMode();
  target = state.target;
  guesses = state.guesses;
  gameOver = state.gameOver;
}

function ensureModeState(modeDaily = isDaily, { forceReset = false } = {}) {
  const state = getStateForMode(modeDaily);

  if (modeDaily) {
    const dailyTarget = getDailyTarget();
    const dailyTargetChanged = !state.target || state.target.name !== dailyTarget.name;
    if (forceReset || dailyTargetChanged) {
      state.target = dailyTarget;
      state.guesses = [];
      state.gameOver = false;
    }
    return state;
  }

  if (forceReset || !state.target) {
    state.target = getRandomTarget();
    state.guesses = [];
    state.gameOver = false;
  }

  return state;
}

async function loadData() {
  if (typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA.length > 0) {
    operatives = EMBEDDED_DATA;
  } else {
    try {
      const resp = await fetch('data.json');
      operatives = await resp.json();
    } catch (e) {
      console.error('Failed to load data:', e);
    }
  }
  dailySchedule = buildDailySchedule();
  allTeams = [...new Set(operatives.map(op => op.team))].sort((left, right) => left.localeCompare(right));
  randomSelectedTeams = new Set(allTeams);
  pendingRandomSelectedTeams = new Set(allTeams);
  syncRandomAllowedTeams();
  ensureModeState(true, { forceReset: true });
  ensureModeState(false, { forceReset: true });
  refreshGameView();
}

function refreshGameView() {
  ensureModeState();
  syncActiveState();
  updateFilterTeamsButton();
  document.getElementById('guessRows').innerHTML = '';
  guesses.forEach(op => renderGuessRow(op, { animate: false }));

  const status = document.getElementById('status');
  const endButtons = document.getElementById('endButtons');
  status.textContent = '';
  status.className = 'status';
  endButtons.classList.remove('visible');
  endButtons.classList.remove('anim-in');
  document.getElementById('guessCount').textContent = String(guesses.length);

  const input = document.getElementById('guessInput');
  const guessButton = document.getElementById('guessBtn');
  input.disabled = gameOver;
  guessButton.disabled = gameOver;
  input.value = '';
  dropdown.classList.remove('visible');
  filteredOps = [];
  selectedIdx = -1;

  if (gameOver) {
    const won = guesses.length > 0 && guesses[guesses.length - 1].name === target.name;
    status.textContent = won
      ? `You got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`
      : `Game over! It was ${target.name} (${target.team})`;
    status.className = `status ${won ? 'win' : 'lose'}`;
    endButtons.classList.add('visible');
  } else {
    input.focus();
  }
}

function resetCurrentModeGame() {
  ensureModeState(isDaily, { forceReset: true });
  refreshGameView();
}

function setMode(modeDaily) {
  if (isDaily === modeDaily) return;
  isDaily = modeDaily;
  document.getElementById('dailyBtn').classList.toggle('active', isDaily);
  document.getElementById('randomBtn').classList.toggle('active', !isDaily);
  refreshGameView();
}

function updateFilterTeamsButton() {
  const filterButton = document.getElementById('filterTeamsBtn');
  filterButton.classList.toggle('hidden', isDaily || allTeams.length === 0);
  filterButton.textContent = `Filter Teams (${randomAllowedTeams.size}/${allTeams.length})`;
}

// Mode toggle
document.getElementById('dailyBtn').addEventListener('click', () => {
  setMode(true);
});

document.getElementById('randomBtn').addEventListener('click', () => {
  setMode(false);
});

// Autocomplete
const input = document.getElementById('guessInput');
const dropdown = document.getElementById('dropdown');
let selectedIdx = -1;
let filteredOps = [];

input.addEventListener('input', () => {
  const val = input.value.trim().toUpperCase();
  if (val.length < 1) {
    dropdown.classList.remove('visible');
    filteredOps = [];
    return;
  }

  const guessedNames = new Set(guesses.map(g => g.name));
  filteredOps = getCurrentOperativePool()
    .filter(o => !guessedNames.has(o.name) && o.name.toUpperCase().includes(val))
    .slice(0, 15);

  if (filteredOps.length === 0) {
    dropdown.classList.remove('visible');
    return;
  }

  selectedIdx = -1;
  renderDropdown();
  dropdown.classList.add('visible');
});

input.addEventListener('keydown', (e) => {
  if (!dropdown.classList.contains('visible') || filteredOps.length === 0) {
    if (e.key === 'Enter') {
      trySubmit(input.value.trim());
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, filteredOps.length - 1);
    renderDropdown();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, -1);
    renderDropdown();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0 && selectedIdx < filteredOps.length) {
      submitGuess(filteredOps[selectedIdx]);
    } else {
      trySubmit(input.value.trim());
    }
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('visible');
  }
});

function trySubmit(val) {
  const upper = val.toUpperCase();
  const match = getCurrentOperativePool().find(o => o.name.toUpperCase() === upper);
  if (match) {
    submitGuess(match);
  }
}

function renderDropdown() {
  dropdown.innerHTML = filteredOps.map((o, i) =>
    `<div class="dropdown-item${i === selectedIdx ? ' selected' : ''}"
          data-idx="${i}">
      ${o.name}<span class="team-hint">${o.team}</span>
    </div>`
  ).join('');

  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const idx = parseInt(el.dataset.idx);
      submitGuess(filteredOps[idx]);
    });
  });

  if (selectedIdx >= 0) {
    const sel = dropdown.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }
}

input.addEventListener('blur', () => {
  setTimeout(() => dropdown.classList.remove('visible'), 150);
});

input.addEventListener('focus', () => {
  if (input.value.trim().length > 0 && filteredOps.length > 0) {
    dropdown.classList.add('visible');
  }
});

function submitGuess(op) {
  if (gameOver) return;

  if (guesses.find(g => g.name === op.name)) {
    input.value = '';
    dropdown.classList.remove('visible');
    return;
  }

  guesses.push(op);
  dropdown.classList.remove('visible');
  input.value = '';
  filteredOps = [];

  triggerGuessButtonAnimation();

  renderGuessRow(op);

  document.getElementById('guessCount').textContent = guesses.length;

  // Calculate delay for status/buttons to appear after cell animations
  const animDelay = 6 * 120 + 600;

  if (op.name === target.name) {
    gameOver = true;
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    setTimeout(() => {
      const s = document.getElementById('status');
      s.textContent = `You got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`;
      s.className = 'status win anim-in';
      const eb = document.getElementById('endButtons');
      eb.classList.add('visible');
      eb.classList.add('anim-in');
    }, animDelay);
  } else if (guesses.length >= maxGuesses) {
    gameOver = true;
    input.disabled = true;
    document.getElementById('guessBtn').disabled = true;
    setTimeout(() => {
      const s = document.getElementById('status');
      s.textContent = `Game over! It was ${target.name} (${target.team})`;
      s.className = 'status lose anim-in';
      const eb = document.getElementById('endButtons');
      eb.classList.add('visible');
      eb.classList.add('anim-in');
    }, animDelay);
  } else {
    input.focus();
  }
}

function triggerGuessButtonAnimation() {
  const guessButton = document.getElementById('guessBtn');
  guessButton.classList.remove('anim-press');
  void guessButton.offsetWidth;
  guessButton.classList.add('anim-press');
  setTimeout(() => guessButton.classList.remove('anim-press'), 700);
}

function spawnParticles(cell, isCorrect) {
  const container = document.createElement('div');
  container.className = 'cell-particles';
  const count = isCorrect ? 8 : 4;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 14 + Math.random() * 18;
    p.className = `particle${isCorrect ? ' green' : ''}`;
    p.style.setProperty('--px', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--py', `${Math.sin(angle) * dist}px`);
    p.style.animationDelay = `${Math.random() * 0.08}s`;
    container.appendChild(p);
  }
  cell.appendChild(container);
  setTimeout(() => container.remove(), 1000);
}

function renderGuessRow(op, { animate = true } = {}) {
  const row = document.createElement('div');
  row.className = 'guess-row';

  // Weapon rules matching
  const guessRules = op.weapon_rules || [];
  const targetRules = target.weapon_rules || [];
  const guessSet = new Set(guessRules.map(r => r.toLowerCase()));
  const targetSet = new Set(targetRules.map(r => r.toLowerCase()));
  const allMatch = guessSet.size === targetSet.size && [...guessSet].every(r => targetSet.has(r));
  const someMatch = !allMatch && [...guessSet].some(r => targetSet.has(r));
  const wrStatus = allMatch ? 'correct' : someMatch ? 'partial' : 'wrong';

  // Build display: show guessed operative's rules as readable chips, highlight matches in green.
  let wrDisplay = '';
  if (guessRules.length === 0) {
    wrDisplay = '<div class="wr-chip-stack"><span class="wr-chip">None</span></div>';
  } else {
    wrDisplay = `<div class="wr-chip-stack">${guessRules.map(r => {
      const matched = targetSet.has(r.toLowerCase());
      return `<span class="wr-chip${matched ? ' match' : ''}">${escapeHtml(r)}</span>`;
    }).join('')}</div>`;
  }

  const fields = [
    { val: op.team, correct: op.team === target.team, cls: null },
    { val: op.apl, correct: op.apl === target.apl, cls: null },
    { val: op.faction, correct: op.faction === target.faction, cls: null },
    { val: op.base_size, correct: op.base_size === target.base_size, cls: null },
    { val: wrDisplay, correct: allMatch, cls: wrStatus, isHtml: true, isWr: true },
    { val: op.name, correct: op.name === target.name, cls: null },
  ];

  const cells = [];
  fields.forEach(f => {
    const cell = document.createElement('div');
    const cellClass = f.cls || (f.correct ? 'correct' : 'wrong');
    cell.className = `cell ${cellClass}${animate ? ' anim-pending' : ''}${f.isWr ? ' wr-cell' : ''}`;
    if (f.isHtml) {
      cell.innerHTML = f.val;
    } else {
      cell.textContent = f.val;
    }
    cell.title = f.isHtml ? (op.weapon_rules || []).join(', ') || 'None' : String(f.val);
    cell._isCorrect = f.correct;
    cell._isPartial = f.cls === 'partial';
    row.appendChild(cell);
    cells.push(cell);
  });

  document.getElementById('guessRows').appendChild(row);

  if (!animate) {
    return 0;
  }

  // Stagger reveal left to right
  cells.forEach((cell, i) => {
    setTimeout(() => {
      cell.classList.remove('anim-pending');
      cell.classList.add((cell._isCorrect || cell._isPartial) ? 'anim-glow' : 'anim-shake');
      spawnParticles(cell, cell._isCorrect);
    }, i * 120);
  });

  // Return total animation time for sequencing status/buttons
  return cells.length * 120 + 500;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function syncTeamFilterCategoryControls() {
  const classifiedCount = allTeams.filter(team => isClassifiedTeam(team)).length;
  const declassifiedCount = allTeams.length - classifiedCount;
  classifiedTeamsCount.textContent = `${classifiedCount} teams`;
  declassifiedTeamsCount.textContent = `${declassifiedCount} teams`;

  const classifiedTeams = getTeamsForCategory('classified');
  const selectedClassified = classifiedTeams.filter(team => pendingRandomSelectedTeams.has(team)).length;
  const declassifiedTeams = getTeamsForCategory('declassified');
  const selectedDeclassified = declassifiedTeams.filter(team => pendingRandomSelectedTeams.has(team)).length;

  classifiedTeamsToggle.checked = selectedClassified === classifiedTeams.length && classifiedTeams.length > 0;
  classifiedTeamsToggle.indeterminate = selectedClassified > 0 && selectedClassified < classifiedTeams.length;
  declassifiedTeamsToggle.checked = selectedDeclassified === declassifiedTeams.length && declassifiedTeams.length > 0;
  declassifiedTeamsToggle.indeterminate = selectedDeclassified > 0 && selectedDeclassified < declassifiedTeams.length;
}

function updateTeamFilterSummary() {
  const selectedCount = pendingRandomSelectedTeams.size;
  teamFilterSummary.textContent = `${selectedCount} of ${allTeams.length} teams enabled for random mode.`;
  teamFilterApplyBtn.disabled = selectedCount === 0;
  syncTeamFilterCategoryControls();
}

function renderTeamFilterList() {
  const renderGroup = (title, teams) => `
    <div class="team-filter-group">
      <div class="team-filter-group-title">${title}</div>
      <div class="team-filter-group-grid">
        ${teams.map(team => `
          <label class="team-filter-option">
            <input type="checkbox" data-team="${escapeHtml(team)}" ${pendingRandomSelectedTeams.has(team) ? 'checked' : ''}>
            <span class="team-filter-label">${escapeHtml(team)}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `;

  teamFilterList.innerHTML = [
    renderGroup('Classified', getTeamsForCategory('classified')),
    renderGroup('Declassified', getTeamsForCategory('declassified'))
  ].join('');

  teamFilterList.querySelectorAll('input[type="checkbox"]').forEach(inputEl => {
    inputEl.addEventListener('change', () => {
      const team = inputEl.dataset.team;
      if (inputEl.checked) {
        pendingRandomSelectedTeams.add(team);
      } else {
        pendingRandomSelectedTeams.delete(team);
      }
      updateTeamFilterSummary();
    });
  });
}

function openTeamFilter() {
  if (isDaily || allTeams.length === 0) return;
  pendingRandomSelectedTeams = new Set(randomSelectedTeams);
  renderTeamFilterList();
  updateTeamFilterSummary();
  teamFilterBackdrop.classList.add('visible');
}

function closeTeamFilter() {
  teamFilterBackdrop.classList.remove('visible');
}

function applyRandomTeamFilter() {
  if (pendingRandomSelectedTeams.size === 0) {
    return;
  }

  randomSelectedTeams = new Set(pendingRandomSelectedTeams);
  randomAllowedTeams = new Set(pendingRandomSelectedTeams);

  const randomState = gameStates.random;
  const targetRemoved = randomState.target && !randomAllowedTeams.has(randomState.target.team);
  const removedGuesses = randomState.guesses.some(guess => !randomAllowedTeams.has(guess.team));

  if (targetRemoved || removedGuesses) {
    ensureModeState(false, { forceReset: true });
  }

  closeTeamFilter();
  if (!isDaily) {
    refreshGameView();
  } else {
    updateFilterTeamsButton();
  }
}

document.getElementById('filterTeamsBtn').addEventListener('click', openTeamFilter);
document.getElementById('selectAllTeamsBtn').addEventListener('click', () => {
  pendingRandomSelectedTeams = new Set(allTeams);
  renderTeamFilterList();
  updateTeamFilterSummary();
});
document.getElementById('clearAllTeamsBtn').addEventListener('click', () => {
  pendingRandomSelectedTeams = new Set();
  renderTeamFilterList();
  updateTeamFilterSummary();
});
classifiedTeamsToggle.addEventListener('change', () => {
  getTeamsForCategory('classified').forEach(team => {
    if (classifiedTeamsToggle.checked) {
      pendingRandomSelectedTeams.add(team);
    } else {
      pendingRandomSelectedTeams.delete(team);
    }
  });
  renderTeamFilterList();
  updateTeamFilterSummary();
});
declassifiedTeamsToggle.addEventListener('change', () => {
  getTeamsForCategory('declassified').forEach(team => {
    if (declassifiedTeamsToggle.checked) {
      pendingRandomSelectedTeams.add(team);
    } else {
      pendingRandomSelectedTeams.delete(team);
    }
  });
  renderTeamFilterList();
  updateTeamFilterSummary();
});
document.getElementById('teamFilterCancelBtn').addEventListener('click', closeTeamFilter);
document.getElementById('teamFilterApplyBtn').addEventListener('click', applyRandomTeamFilter);
teamFilterBackdrop.addEventListener('click', closeTeamFilter);
document.querySelector('.team-filter-box').addEventListener('click', (e) => e.stopPropagation());

// Share functionality
function getGuessStatus(op) {
  const guessRules = op.weapon_rules || [];
  const targetRules = target.weapon_rules || [];
  const guessSet = new Set(guessRules.map(r => r.toLowerCase()));
  const targetSet = new Set(targetRules.map(r => r.toLowerCase()));
  const allWrMatch = guessSet.size === targetSet.size && [...guessSet].every(r => targetSet.has(r));
  const someWrMatch = !allWrMatch && [...guessSet].some(r => targetSet.has(r));

  return {
    values: [op.team, String(op.apl), op.faction, op.base_size, guessRules.join(', ') || 'None', op.name],
    states: [
      op.team === target.team ? 'correct' : 'wrong',
      op.apl === target.apl ? 'correct' : 'wrong',
      op.faction === target.faction ? 'correct' : 'wrong',
      op.base_size === target.base_size ? 'correct' : 'wrong',
      allWrMatch ? 'correct' : someWrMatch ? 'partial' : 'wrong',
      op.name === target.name ? 'correct' : 'wrong'
    ]
  };
}

function buildEmojiShareText() {
  const won = guesses.length > 0 && guesses[guesses.length - 1].name === target.name;
  const score = won ? guesses.length : 'X';
  const mode = isDaily ? 'Daily' : 'Random';
  const emojiMap = { correct: '🟩', partial: '🟨', wrong: '🟥' };
  const rows = guesses.map(g => getGuessStatus(g).states.map(state => emojiMap[state]).join(''));
  const title = isDaily
    ? `KillTeadle ${mode} ${score}/${maxGuesses}`
    : 'This is my latest KillTeadle';
  return [
    title,
    `Guesses: ${guesses.length}`,
    ...rows,
    'https://killteadle.disregardingdice.com/'
  ].join('\n');
}

function buildShareCanvas() {
  const won = guesses.length > 0 && guesses[guesses.length - 1].name === target.name;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
    const cols = ['Team', 'APL', 'Faction', 'Base', 'W. Rules', 'Operative'];
    const colWidths = [130, 45, 100, 60, 120, 150];
    const rowH = 34;
    const headerH = 30;
    const pad = 16;
    const totalW = colWidths.reduce((a,b) => a+b, 0) + (cols.length - 1) * 4 + pad * 2;
    const titleH = 50;
    const statusH = 36;
    const urlBarH = 32;
    const totalH = titleH + headerH + 4 + guesses.length * (rowH + 4) + statusH + urlBarH + pad * 2;

    canvas.width = totalW;
    canvas.height = totalH;

    // Background
    ctx.fillStyle = '#1a1715';
    ctx.fillRect(0, 0, totalW, totalH);

    // Orange top bar
    ctx.fillStyle = '#f15c22';
    ctx.fillRect(0, 0, totalW, 3);

    // Title
    ctx.font = 'bold 22px Oswald, Impact, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText('KillTeadle', totalW / 2, titleH - 12);

    // Header row
    let y = titleH;
    let x = pad;
    ctx.font = 'bold 10px Oswald, Impact, sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < cols.length; i++) {
      ctx.fillStyle = 'rgba(35,31,32,0.85)';
      ctx.fillRect(x, y, colWidths[i], headerH);
      ctx.fillStyle = '#f15c22';
      ctx.fillRect(x, y + headerH - 2, colWidths[i], 2);
      ctx.fillStyle = '#f15c22';
      ctx.fillText(cols[i].toUpperCase(), x + colWidths[i] / 2, y + headerH / 2 + 4);
      x += colWidths[i] + 4;
    }
    y += headerH + 4;

    // Guess rows
    ctx.font = '600 11px Barlow Condensed, Arial Narrow, sans-serif';
    for (const g of guesses) {
      const status = getGuessStatus(g);
      const vals = status.values;
      const colors = [
        status.states[0] === 'correct' ? '#2d6a4f' : '#7a1a1a',
        status.states[1] === 'correct' ? '#2d6a4f' : '#7a1a1a',
        status.states[2] === 'correct' ? '#2d6a4f' : '#7a1a1a',
        status.states[3] === 'correct' ? '#2d6a4f' : '#7a1a1a',
        status.states[4] === 'correct' ? '#2d6a4f' : status.states[4] === 'partial' ? '#b8860b' : '#7a1a1a',
        status.states[5] === 'correct' ? '#2d6a4f' : '#7a1a1a',
      ];
      x = pad;
      for (let i = 0; i < vals.length; i++) {
        ctx.fillStyle = colors[i];
        ctx.fillRect(x, y, colWidths[i], rowH);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        // In daily mode, hide text to avoid spoilers
        if (!isDaily) {
          let text = vals[i];
          while (ctx.measureText(text).width > colWidths[i] - 8 && text.length > 3) {
            text = text.slice(0, -1);
          }
          ctx.fillText(text, x + colWidths[i] / 2, y + rowH / 2 + 4);
        }
        x += colWidths[i] + 4;
      }
      y += rowH + 4;
    }

    // Status text
    ctx.font = 'bold 14px Oswald, Impact, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = won ? '#2d6a4f' : '#f15c22';
    const statusText = won
      ? `Got it in ${guesses.length} guess${guesses.length > 1 ? 'es' : ''}!`
      : `Answer: ${target.name}`;
    ctx.fillText(statusText, totalW / 2, y + 20);

    // URL line - prominent
    ctx.font = 'bold 13px Barlow Condensed, Arial Narrow, sans-serif';
    ctx.fillStyle = '#f15c22';
    ctx.textAlign = 'center';
    ctx.fillText('\u25B6  killteadle.disregardingdice.com  \u25C0', totalW / 2, y + 44);

    // Orange bottom bar
    ctx.fillStyle = '#f15c22';
    ctx.fillRect(0, totalH - 3, totalW, 3);

    return canvas;
}

// Share: use native share sheet on mobile, clipboard on desktop
document.getElementById('shareBtn').addEventListener('click', async () => {
  try {
    const canvas = buildShareCanvas();
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const file = new File([blob], 'killteadle.png', { type: 'image/png' });

    // Use native share sheet on mobile only (touch devices)
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'KillTeadle',
        url: 'https://killteadle.disregardingdice.com/'
      });
      showToast('Shared!');
      return;
    }

    // Desktop / non-touch: copy image to clipboard
    try {
      const textBlob = new Blob(['https://killteadle.disregardingdice.com/'], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({
          'image/png': blob,
          'text/plain': textBlob
        })
      ]);
    } catch {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
    }
    showToast('Image copied! Paste in Discord');
  } catch (err) {
    // Final fallback: download the file
    try {
      const canvas = buildShareCanvas();
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'killteadle.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Image saved!');
    } catch (e2) {
      console.error('Share failed:', e2);
    }
  }
});

function copyTextFallback(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  return ok;
}

document.getElementById('emojiShareBtn').addEventListener('click', async () => {
  const shareText = buildEmojiShareText();

  try {
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile && navigator.share) {
      await navigator.share({
        title: 'KillTeadle',
        text: shareText,
        url: 'https://killteadle.disregardingdice.com/'
      });
      showToast('Emoji results shared!');
      return;
    }

    try {
      await navigator.clipboard.writeText(shareText);
    } catch {
      if (!copyTextFallback(shareText)) throw new Error('execCommand copy failed');
    }
    showToast('Emoji results copied!');
  } catch (err) {
    console.error('Emoji share failed:', err);
  }
});

// Copy Link: quick copy the URL
document.getElementById('copyLinkBtn').addEventListener('click', async () => {
  const url = 'https://killteadle.disregardingdice.com/';
  try {
    try {
      await navigator.clipboard.writeText(url);
    } catch {
      if (!copyTextFallback(url)) throw new Error('execCommand copy failed');
    }
    showToast('Link copied!');
  } catch (err) {
    console.error('Copy link failed:', err);
  }
});

function showToast(msg) {
  const toast = document.getElementById('shareToast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

  navigator.serviceWorker.register('sw.js').catch(() => {});
}
